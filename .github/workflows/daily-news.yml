name: Legal Tech News Bot

on:
  # ⚠️ 已禁用GitHub自带定时任务（有2-3小时延迟问题）
  # 现在使用 cron-job.org 准时触发（每天12:00北京时间）
  # 如需恢复GitHub自带定时，取消下方注释
  # schedule:
  #   - cron: '0 4 * * *'  # UTC 04:00 = 北京时间 12:00

  # ✅ 通过 cron-job.org 或手动触发
  workflow_dispatch:

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv feedparser schedule deep-translator

      - name: 创建 .env 文件
        run: |
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> .env
          echo "GLM_API_KEY=${{ secrets.GLM_API_KEY }}" >> .env
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" >> .env
          echo "RUN_MODE=test" >> .env
          echo "ENABLE_FALLBACK=true" >> .env
          echo "SEARCH_KEYWORDS=${{ secrets.SEARCH_KEYWORDS }}" >> .env
          echo "SEARCH_KEYWORDS_CN=${{ secrets.SEARCH_KEYWORDS_CN }}" >> .env
          echo "MAX_ARTICLES=15" >> .env
          echo "TRANSLATION_PROVIDER=glm" >> .env

      - name: 检查环境变量配置
        run: |
          echo "📋 检查环境变量配置："
          echo "GLM_API_KEY是否为空: $([ -z \"$GLM_API_KEY\" ] && echo '是（未配置或为空）' || echo '否（已配置）')"
          echo "CLAUDE_API_KEY是否为空: $([ -z \"$CLAUDE_API_KEY\" ] && echo '是（未配置或为空）' || echo '否（已配置）')"
          echo ""
          echo "📋 .env文件内容（敏感信息已隐藏）："
          grep -E "^(GLM_API_KEY|CLAUDE_API_KEY|TRANSLATION_PROVIDER)=" .env | sed 's/=.*/=***/' || echo "无法读取.env文件"
          echo ""
          if [ -z "$GLM_API_KEY" ]; then
            echo "❌ 警告: GLM_API_KEY未配置或为空！"
            echo "   将使用备用翻译方案"
            echo "   请在GitHub Secrets中配置GLM_API_KEY"
          else
            echo "✅ GLM_API_KEY已配置"
          fi

      - name: 运行新闻 Bot
        run: python legal_tech_news_bot.py

      - name: 上传日志文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            news_bot.log
            bot.log
          retention-days: 7
