name: Legal Tech News Bot

on:
  # GitHub 原生定时触发：每天 UTC 04:00（北京时间 12:00）
  schedule:
    - cron: '0 4 * * *'

  # 保留手动触发，便于临时测试
  workflow_dispatch:

jobs:
  fetch-and-send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv feedparser schedule deep-translator

      - name: 创建 .env 文件
        run: |
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> .env
          echo "GLM_API_KEY=${{ secrets.GLM_API_KEY }}" >> .env
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" >> .env
          echo "RUN_MODE=test" >> .env
          echo "ENABLE_FALLBACK=true" >> .env
          echo "SEARCH_KEYWORDS=${{ secrets.SEARCH_KEYWORDS }}" >> .env
          echo "SEARCH_KEYWORDS_CN=${{ secrets.SEARCH_KEYWORDS_CN }}" >> .env
          echo "MAX_ARTICLES=15" >> .env
          echo "TRANSLATION_PROVIDER=glm" >> .env

      - name: 检查.env文件配置
        run: |
          echo "📋 检查.env文件配置："
          echo ""
          echo "📄 .env文件内容（敏感信息已隐藏）："
          grep -E "^(GLM_API_KEY|CLAUDE_API_KEY|TRANSLATION_PROVIDER)=" .env | sed 's/=.*/=***/' || echo "无法读取.env文件"
          echo ""
          echo "🔍 检查API Key是否为空："
          if grep -q "^GLM_API_KEY=$" .env; then
            echo "❌ GLM_API_KEY为空！"
            echo "   将使用备用翻译方案"
          elif grep -q "^GLM_API_KEY=" .env; then
            echo "✅ GLM_API_KEY已配置（非空）"
          else
            echo "❌ GLM_API_KEY不存在"
          fi
          echo ""
          if grep -q "^CLAUDE_API_KEY=$" .env; then
            echo "⚠️ CLAUDE_API_KEY为空"
          elif grep -q "^CLAUDE_API_KEY=" .env; then
            echo "✅ CLAUDE_API_KEY已配置（非空）"
          else
            echo "❌ CLAUDE_API_KEY不存在"
          fi

      - name: 运行新闻 Bot
        run: python legal_tech_news_bot.py

      - name: 上传日志文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            news_bot.log
            bot.log
          retention-days: 7
